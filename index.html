    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            text-align: center;
            background-color: #f4f4f9;
            color: #333;
            margin-top: 50px;
        }
        .container {
            max-width: 400px;
            margin: 0 auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);

        .hidden {

        }
        h1 { color: #2c3e50; }

            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            background-color: #3498db;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 15px;
            width: 100%;
        }
        button:hover { background-color: #2980b9; }
        input {
            padding: 10px;
            font-size: 16px;
            width: 80%;
            margin-top: 10px;
            text-align: center;
        }
        #secret-word {
            font-size: 24px;
            font-weight: bold;
            margin: 20px 0;
            padding: 30px 20px;
            background-color: #fceceb;
            border-radius: 10px;
            line-height: 1.5;
        }
    </style>

        <div id="setup-screen">

            <input type="number" id="player-count" min="3" max="8" value="4">
            <button onclick="startGame()">게임 시작</button>
        </div>

        <div id="check-screen" class="hidden">

            <button onclick="showWord()" id="show-btn">나의 단어 확인하기</button>
            
            <div id="word-display" class="hidden">

        </div>

            <button onclick="location.reload()" style="background-color: #f39c12;">새 게임하기</button>

        let playerCount = 0;
        let currentPlayer = 1;
        let liarIndex = 0;
        
        let normalWord = "";
        let liarWord = "";

        function startGame() {
            const countInput = document.getElementById('player-count').value;
            playerCount = parseInt(countInput);

            if (playerCount < 3 || playerCount > 8) {
                alert("참가자는 3명에서 8명 사이여야 합니다.");
                return;
            }

            // 랜덤으로 라이어 순서 지정
            liarIndex = Math.floor(Math.random() * playerCount) + 1;
            
            // 랜덤으로 단어 세트 선정
            const randomPair = wordPairs[Math.floor(Math.random() * wordPairs.length)];

            // 누가 라이어 단어를 가질지 매번 고정되지 않게 50% 확률로 섞기
            if (Math.random() > 0.5) {
                normalWord = randomPair.normal;
                liarWord = randomPair.liar;
            } else {
                normalWord = randomPair.liar;
                liarWord = randomPair.normal;
            }

            // 화면 전환
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('check-screen').classList.remove('hidden');
            updateTurnDisplay();
        }

        function updateTurnDisplay() {
            document.getElementById('turn-display').innerText = currentPlayer + "번째 플레이어";
            document.getElementById('show-btn').classList.remove('hidden');
            document.getElementById('word-display').classList.add('hidden');
        }

        function showWord() {
            document.getElementById('show-btn').classList.add('hidden');
            document.getElementById('word-display').classList.remove('hidden');

            const wordEl = document.getElementById('secret-word');
            
            if (currentPlayer === liarIndex) {
                wordEl.innerHTML = `당신의 단어: <br><br> <span style="font-size: 32px; color: #c0392b;">${liarWord}</span>`;
            } else {
                wordEl.innerHTML = `당신의 단어: <br><br> <span style="font-size: 32px; color: #2980b9;">${normalWord}</span>`;
            }
        }

        function nextPlayer() {
            currentPlayer++;
            if (currentPlayer > playerCount) {
                // 모든 플레이어가 확인 완료
                document.getElementById('check-screen').classList.add('hidden');
                document.getElementById('play-screen').classList.remove('hidden');
            } else {
                // 다음 플레이어로 세팅
                updateTurnDisplay();
            }
        }
